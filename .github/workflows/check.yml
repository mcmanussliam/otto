name: check

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: download modules
        run: go mod download

      - name: verify mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: verify formatting
        run: |
          files="$(git ls-files '*.go')"
          if [ -z "$files" ]; then
            exit 0
          fi
          unformatted="$(gofmt -l $files)"
          if [ -n "$unformatted" ]; then
            echo "these files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: run tests
        run: go test ./...

      - name: run race tests
        run: go test -race ./...

      - name: run vet
        run: go vet ./...

      - name: run lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

      - name: build binary
        run: go build ./cmd/otto
