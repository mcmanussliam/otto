name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
          - goos: windows
            goarch: arm64
            archive_ext: zip

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          name="otto_${VERSION}_${GOOS}_${GOARCH}"
          bin="$name"
          if [ "$GOOS" = "windows" ]; then
            bin="${name}.exe"
          fi

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -trimpath \
            -ldflags "-s -w -X github.com/mcmanussliam/otto/internal/version.Value=${VERSION}" \
            -o "dist/${bin}" ./cmd/otto

          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd dist && zip -q "${name}.zip" "${bin}")
          else
            tar -C dist -czf "dist/${name}.tar.gz" "${bin}"
          fi

          rm -f "dist/${bin}"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: build-artifacts
    permissions:
      contents: write

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: generate checksums
        run: |
          set -euo pipefail
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/checksums.txt

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            scripts/install.sh
            scripts/install.ps1

  update-homebrew-formula:
    runs-on: ubuntu-latest
    needs: publish-release
    permissions:
      contents: write

    steps:
      - name: checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: render formula for release tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          chmod +x scripts/render-homebrew-formula.sh
          ./scripts/render-homebrew-formula.sh "$TAG" Formula/otto.rb

      - name: commit formula update
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/otto.rb; then
            echo "no formula changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/otto.rb
          git commit -m "chore(homebrew): update formula for ${TAG}"
          git push
